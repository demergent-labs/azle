name: Run Test

on:
    workflow_call:
        inputs:
            directories:
                required: true
                type: string
            exclude-dirs:
                required: false
                type: string
                default: ''
            link-azle:
                required: true
                type: boolean
            run-experimental:
                required: false
                type: boolean
                default: false
            fuzz:
                required: false
                type: boolean
                default: false
            call-delay:
                required: false
                type: string
                default: '.1'
            time-limit:
                required: false
                type: string
                default: '300'
            operating-system:
                required: false
                type: string
                default: 'linux'
                description: 'Operating system to run tests on (linux, mac, or windows)'

jobs:
    get-test-infos:
        name: Get test infos
        runs-on: ubuntu-latest
        outputs:
            test-infos: ${{ steps.get-test-infos.outputs.test-infos }}
        steps:
            - uses: actions/checkout@v4

            - id: get-test-infos
              uses: ./.github/actions/get_test_infos
              with:
                  directories: ${{ inputs.directories }}
                  exclude-dirs: ${{ inputs.exclude-dirs }}

    run-test:
        name: '${{matrix.test.name}} | ${{matrix.test.displayPath}} | ${{matrix.azle_source}}'
        needs: get-test-infos
        runs-on: ${{ matrix.os }}
        env:
            ETHEREUM_URL: ${{ secrets.ETHEREUM_URL }}
            AZLE_IDENTITY_STORAGE_MODE: 'plaintext'
            AZLE_END_TO_END_TEST_LINK_AZLE: ${{ matrix.azle_source == 'repo' }}
            AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE: ''
            AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE: ''
            AZLE_IS_RELEASE_BRANCH_PR: ''
            AZLE_IS_FEATURE_BRANCH_PR: ''
            AZLE_IS_FEATURE_BRANCH_DRAFT_PR: ''

        strategy:
            fail-fast: false # We want to see which example tests succeed and which ones fail, we don't want one example test to cancel the rest
            matrix: # spins up one job per combination of test and code source (repo or npm).
                os:
                    - ${{ inputs.operating-system == 'mac' && 'macos-latest' || inputs.operating-system == 'windows' && 'windows-latest' || 'ubuntu-latest' }}
                azle_source:
                    - ${{ inputs.link-azle == true && 'repo' || 'npm' }}
                test: ${{ fromJSON(needs.get-test-infos.outputs.test-infos) }}
        steps:
            - uses: actions/checkout@v4

            - name: Setup WSL
              if: matrix.os == 'windows-latest'
              uses: Vampire/setup-wsl@v3
              with:
                  distribution: Ubuntu-22.04
                  update: 'true'
                  additional-packages: curl build-essential

            - uses: ./.github/actions/determine_workflow_context
              id: set-conditions

            - name: Set condition environment variables
              run: |
                  echo "AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE=${{ steps.set-conditions.outputs.is_main_branch_push_from_feature_merge }}" >> $GITHUB_ENV
                  echo "AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE=${{ steps.set-conditions.outputs.is_main_branch_push_from_release_merge }}" >> $GITHUB_ENV
                  echo "AZLE_IS_RELEASE_BRANCH_PR=${{ steps.set-conditions.outputs.is_release_branch_pr }}" >> $GITHUB_ENV
                  echo "AZLE_IS_FEATURE_BRANCH_PR=${{ steps.set-conditions.outputs.is_feature_branch_pr }}" >> $GITHUB_ENV
                  echo "AZLE_IS_FEATURE_BRANCH_DRAFT_PR=${{ steps.set-conditions.outputs.is_feature_branch_draft_pr }}" >> $GITHUB_ENV

            - name: Print environment variables
              run: |
                  echo "AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE: $AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE"
                  echo "AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE: $AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE"
                  echo "AZLE_IS_RELEASE_BRANCH_PR: $AZLE_IS_RELEASE_BRANCH_PR"
                  echo "AZLE_IS_FEATURE_BRANCH_PR: $AZLE_IS_FEATURE_BRANCH_PR"
                  echo "AZLE_IS_FEATURE_BRANCH_DRAFT_PR: $AZLE_IS_FEATURE_BRANCH_DRAFT_PR"

            - name: Report full path of test
              # Just in case the path isn't obvious from the name, this will remove ambiguity
              run: echo ${{matrix.test.path}}

            - uses: ./.github/actions/setup_node
              if: matrix.os != 'windows-latest'

            - name: Setup Node (WSL)
              if: matrix.os == 'windows-latest'
              shell: wsl-bash {0}
              run: |
                  curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
                  sudo apt-get install -y nodejs

            - uses: ./.github/actions/setup_dfx
              if: matrix.os != 'windows-latest'

            - name: Setup dfx (WSL)
              if: matrix.os == 'windows-latest'
              shell: wsl-bash {0}
              run: |
                  curl -fsSL https://internetcomputer.org/install.sh | sh
                  echo 'export PATH="$HOME/.local/share/dfx/bin:$PATH"' >> ~/.bashrc
                  source ~/.bashrc

            - name: Configure MacOS DNS (if needed)
              if: matrix.os == 'macos-latest'
              run: sudo networksetup -setdnsservers Ethernet 9.9.9.9

            - uses: ./.github/actions/retry_command
              if: matrix.os != 'windows-latest'
              with:
                  command: 'npm install'

            - name: Install npm dependencies (WSL)
              if: matrix.os == 'windows-latest'
              shell: wsl-bash {0}
              run: npm install

            - run: npm link
              if: matrix.azle_source == 'repo' && matrix.os != 'windows-latest'

            - name: Link azle (WSL)
              if: matrix.azle_source == 'repo' && matrix.os == 'windows-latest'
              shell: wsl-bash {0}
              run: npm link

            - run: npm run lint
              if: matrix.os != 'windows-latest'

            - name: Run lint (WSL)
              if: matrix.os == 'windows-latest'
              shell: wsl-bash {0}
              run: npm run lint

            - uses: ./.github/actions/retry_command
              if: matrix.os != 'windows-latest'
              with:
                  command: 'npm install'
                  working-directory: ${{ matrix.test.path }}

            - name: Install test dependencies (WSL)
              if: matrix.os == 'windows-latest'
              shell: wsl-bash {0}
              working-directory: ${{ matrix.test.path }}
              run: npm install

            - name: Install experimental dependencies for stable api tests if running in experimental mode
              if: ${{ inputs.run-experimental && matrix.os != 'windows-latest' }}
              uses: ./.github/actions/retry_command
              with:
                  command: 'npm install https://github.com/demergent-labs/azle-experimental-deps#882dcaa3aa0ccb66d81ee923c8279369a8424bfa'
                  working-directory: ${{ matrix.test.path }}

            - name: Install experimental dependencies (WSL)
              if: ${{ inputs.run-experimental && matrix.os == 'windows-latest' }}
              shell: wsl-bash {0}
              working-directory: ${{ matrix.test.path }}
              run: npm install https://github.com/demergent-labs/azle-experimental-deps#882dcaa3aa0ccb66d81ee923c8279369a8424bfa

            - run: npm link azle
              if: matrix.azle_source == 'repo' && matrix.os != 'windows-latest'
              working-directory: ${{ matrix.test.path }}

            - name: Link azle in test directory (WSL)
              if: matrix.azle_source == 'repo' && matrix.os == 'windows-latest'
              shell: wsl-bash {0}
              working-directory: ${{ matrix.test.path }}
              run: npm link azle

            - name: Start dfx with artificial delay 0
              if: ${{ (steps.set-conditions.outputs.is_feature_branch_pr == 'true' || steps.set-conditions.outputs.is_feature_branch_draft_pr == 'true' || steps.set-conditions.outputs.is_main_branch_push_from_feature_merge == 'true') && matrix.os != 'windows-latest' }}
              working-directory: ${{ matrix.test.path }}
              run: dfx start --clean --background --artificial-delay 0

            - name: Start dfx with artificial delay 0 (WSL)
              if: ${{ (steps.set-conditions.outputs.is_feature_branch_pr == 'true' || steps.set-conditions.outputs.is_feature_branch_draft_pr == 'true' || steps.set-conditions.outputs.is_main_branch_push_from_feature_merge == 'true') && matrix.os == 'windows-latest' }}
              shell: wsl-bash {0}
              working-directory: ${{ matrix.test.path }}
              run: dfx start --clean --background --artificial-delay 0

            - name: Start dfx
              if: ${{ (steps.set-conditions.outputs.is_release_branch_pr == 'true' || steps.set-conditions.outputs.is_main_branch_push_from_release_merge == 'true') && matrix.os != 'windows-latest' }}
              working-directory: ${{ matrix.test.path }}
              run: dfx start --clean --background

            - name: Start dfx (WSL)
              if: ${{ (steps.set-conditions.outputs.is_release_branch_pr == 'true' || steps.set-conditions.outputs.is_main_branch_push_from_release_merge == 'true') && matrix.os == 'windows-latest' }}
              shell: wsl-bash {0}
              working-directory: ${{ matrix.test.path }}
              run: dfx start --clean --background

            - name: Test configuration
              id: test-configuration
              run: |
                  RECORD_ACTIONS='true'
                  RUNS=1

                  if [[ "${{ steps.set-conditions.outputs.is_main_branch_push_from_feature_merge }}" == "true" ]]; then
                      RUNS=5
                  fi

                  if [[ "${{ steps.set-conditions.outputs.is_main_branch_push_from_release_merge }}" == "true" ]]; then
                      RUNS=100
                  fi

                  if [[ "${{ steps.set-conditions.outputs.is_release_branch_pr }}" == "true" ]]; then
                      RECORD_ACTIONS='false'
                      RUNS=10
                  fi

                  if [[ "${{ steps.set-conditions.outputs.is_feature_branch_pr }}" == "true" ]]; then
                      RUNS=5
                  fi

                  if [[ "${{ steps.set-conditions.outputs.is_feature_branch_draft_pr }}" == "true" ]]; then
                      RUNS=1
                  fi

                  echo "Running tests $RUNS times"

                  echo "runs=$RUNS" >> $GITHUB_OUTPUT
                  echo "record_actions=$RECORD_ACTIONS" >> $GITHUB_OUTPUT

            - name: Run tests
              if: matrix.os != 'windows-latest'
              run: npm test
              working-directory: ${{ matrix.test.path }}
              shell: bash -l {0}
              env:
                  AZLE_EXPERIMENTAL: ${{ inputs.run-experimental }}
                  AZLE_FUZZ: ${{ inputs.fuzz }}
                  AZLE_FUZZ_CALL_DELAY: ${{ inputs.call-delay }}
                  AZLE_FUZZ_TIME_LIMIT: ${{ inputs.time-limit }}
                  AZLE_RECORD_ACTIONS: ${{ steps.test-configuration.outputs.record_actions }}
                  AZLE_PROPTEST_NUM_RUNS: ${{ steps.test-configuration.outputs.runs }}
                  AZLE_PROPTEST_VERBOSE: true

            - name: Run tests (WSL)
              if: matrix.os == 'windows-latest'
              shell: wsl-bash {0}
              working-directory: ${{ matrix.test.path }}
              run: npm test
              env:
                  AZLE_EXPERIMENTAL: ${{ inputs.run-experimental }}
                  AZLE_FUZZ: ${{ inputs.fuzz }}
                  AZLE_FUZZ_CALL_DELAY: ${{ inputs.call-delay }}
                  AZLE_FUZZ_TIME_LIMIT: ${{ inputs.time-limit }}
                  AZLE_RECORD_ACTIONS: ${{ steps.test-configuration.outputs.record_actions }}
                  AZLE_PROPTEST_NUM_RUNS: ${{ steps.test-configuration.outputs.runs }}
                  AZLE_PROPTEST_VERBOSE: true
