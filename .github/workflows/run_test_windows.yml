name: Run Test (Windows WSL)

on:
    workflow_call:
        inputs:
            directories:
                required: true
                type: string
            exclude-dirs:
                required: false
                type: string
                default: ''
            link-azle:
                required: true
                type: boolean
            run-experimental:
                required: false
                type: boolean
                default: false
            fuzz:
                required: false
                type: boolean
                default: false
            call-delay:
                required: false
                type: string
                default: '.1'
            time-limit:
                required: false
                type: string
                default: '300'

jobs:
    get-test-infos:
        name: Get test infos
        runs-on: ubuntu-latest
        outputs:
            test-infos: ${{ steps.get-test-infos.outputs.test-infos }}
        steps:
            - uses: actions/checkout@v4

            - id: get-test-infos
              uses: ./.github/actions/get_test_infos
              with:
                  directories: ${{ inputs.directories }}
                  exclude-dirs: ${{ inputs.exclude-dirs }}

    run-test:
        name: '${{matrix.test.name}} | ${{matrix.test.displayPath}} | ${{matrix.azle_source}} | WSL'
        needs: get-test-infos
        runs-on: windows-latest
        env:
            ETHEREUM_URL: ${{ secrets.ETHEREUM_URL }}
            AZLE_IDENTITY_STORAGE_MODE: 'plaintext'
            AZLE_END_TO_END_TEST_LINK_AZLE: ${{ matrix.azle_source == 'repo' }}

        strategy:
            fail-fast: false # We want to see which example tests succeed and which ones fail, we don't want one example test to cancel the rest
            matrix: # spins up one job per combination of test and code source (repo or npm).
                azle_source:
                    - ${{ inputs.link-azle == true && 'repo' || 'npm' }}
                test: ${{ fromJSON(needs.get-test-infos.outputs.test-infos) }}
        steps:
            - name: Setup WSL
              uses: Vampire/setup-wsl@v3
              with:
                  distribution: Ubuntu-22.04
                  update: 'true'
                  additional-packages: curl build-essential git jq
                  wsl-conf: |
                      [boot]
                      systemd=true
                  set-as-default: 'true'
                  wsl-shell-user: 'root'

            - uses: actions/checkout@v4
              with:
                  # Configure checkout to use LF line endings
                  fetch-depth: 0

            - name: Configure git for Unix line endings
              run: |
                  # Configure git to use LF line endings and fix any existing files
                  git config core.autocrlf false
                  git config core.eol lf
                  # Reset and checkout to fix line endings
                  git rm --cached -r .
                  git reset --hard
              shell: wsl-bash {0}

            - uses: ./.github/actions/determine_workflow_context
              id: set-conditions

            - name: Print environment variables
              run: |
                  echo "AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE: $AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE"
                  echo "AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE: $AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE"
                  echo "AZLE_IS_RELEASE_BRANCH_PR: $AZLE_IS_RELEASE_BRANCH_PR"
                  echo "AZLE_IS_FEATURE_BRANCH_PR: $AZLE_IS_FEATURE_BRANCH_PR"
                  echo "AZLE_IS_FEATURE_BRANCH_DRAFT_PR: $AZLE_IS_FEATURE_BRANCH_DRAFT_PR"
              env:
                  AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE: ${{ steps.set-conditions.outputs.is_main_branch_push_from_feature_merge }}
                  AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE: ${{ steps.set-conditions.outputs.is_main_branch_push_from_release_merge }}
                  AZLE_IS_RELEASE_BRANCH_PR: ${{ steps.set-conditions.outputs.is_release_branch_pr }}
                  AZLE_IS_FEATURE_BRANCH_PR: ${{ steps.set-conditions.outputs.is_feature_branch_pr }}
                  AZLE_IS_FEATURE_BRANCH_DRAFT_PR: ${{ steps.set-conditions.outputs.is_feature_branch_draft_pr }}

            - name: Report full path of test
              # Just in case the path isn't obvious from the name, this will remove ambiguity
              run: echo ${{matrix.test.path}}

            - name: Setup Node.js in WSL
              run: |
                  # Get Node version from package.json
                  NODE_VERSION=$(jq -r '.azle.globalDependencies.node // error("node version not found")' "package.json")
                  # Extract major version number (e.g., "22.14.0" -> "22")
                  MAJOR_VERSION=$(echo $NODE_VERSION | cut -d. -f1)
                  echo "Installing Node.js version $NODE_VERSION (major version $MAJOR_VERSION) in WSL..."

                  # Install Node.js using NodeSource repository
                  curl -fsSL https://deb.nodesource.com/setup_${MAJOR_VERSION}.x | sudo -E bash -
                  sudo apt-get install -y nodejs

                  # Verify installation
                  node --version
                  npm --version
              shell: wsl-bash {0}

            - name: Install dfx
              run: |
                  DFX_VERSION=$(jq -r '.azle.globalDependencies.dfx // error("dfx version not found")' "package.json")
                  echo "Installing dfx version $DFX_VERSION..."
                  DFXVM_INIT_YES=true DFX_VERSION=$DFX_VERSION sh -ci "$(curl --retry 3 -fsSL https://sdk.dfinity.org/install.sh)"
                  export PATH="$HOME/.local/share/dfx/bin:$PATH"
                  if ! command -v dfx &> /dev/null; then
                      echo "dfx installation verification failed" >&2
                      exit 1
                  fi
                  echo "dfx installation completed."
              shell: wsl-bash {0}

            - name: Install npm dependencies
              run: |
                  # Add dfx to PATH for this session
                  export PATH="$HOME/.local/share/dfx/bin:$PATH"
                  # Run npm install
                  npm install
              shell: wsl-bash {0}

            - run: npm link
              if: matrix.azle_source == 'repo'
              shell: wsl-bash {0}

            - run: npm run lint
              shell: wsl-bash {0}

            - run: npm install
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}

            - name: Install experimental dependencies for stable api tests if running in experimental mode
              if: ${{ inputs.run-experimental }}
              run: npm install https://github.com/demergent-labs/azle-experimental-deps#882dcaa3aa0ccb66d81ee923c8279369a8424bfa
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}

            - run: npm link azle
              if: matrix.azle_source == 'repo'
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}

            - name: Start dfx with artificial delay 0
              if: ${{ steps.set-conditions.outputs.is_feature_branch_pr == 'true' || steps.set-conditions.outputs.is_feature_branch_draft_pr == 'true' || steps.set-conditions.outputs.is_main_branch_push_from_feature_merge == 'true' }}
              working-directory: ${{ matrix.test.path }}
              run: |
                  export PATH="$HOME/.local/share/dfx/bin:$PATH"
                  dfx start --clean --background --artificial-delay 0
              shell: wsl-bash {0}

            - name: Start dfx
              if: ${{ steps.set-conditions.outputs.is_release_branch_pr == 'true' || steps.set-conditions.outputs.is_main_branch_push_from_release_merge == 'true' }}
              working-directory: ${{ matrix.test.path }}
              run: |
                  export PATH="$HOME/.local/share/dfx/bin:$PATH"
                  dfx start --clean --background
              shell: wsl-bash {0}

            - name: Test configuration
              id: test-configuration
              shell: bash
              run: |
                  RECORD_ACTIONS='true'
                  RUNS=1

                  if [[ "${{ steps.set-conditions.outputs.is_main_branch_push_from_feature_merge }}" == "true" ]]; then
                      RUNS=5
                  fi

                  if [[ "${{ steps.set-conditions.outputs.is_main_branch_push_from_release_merge }}" == "true" ]]; then
                      RUNS=100
                  fi

                  if [[ "${{ steps.set-conditions.outputs.is_release_branch_pr }}" == "true" ]]; then
                      RECORD_ACTIONS='false'
                      RUNS=10
                  fi

                  if [[ "${{ steps.set-conditions.outputs.is_feature_branch_pr }}" == "true" ]]; then
                      RUNS=5
                  fi

                  if [[ "${{ steps.set-conditions.outputs.is_feature_branch_draft_pr }}" == "true" ]]; then
                      RUNS=1
                  fi

                  echo "Running tests $RUNS times"

                  echo "runs=$RUNS" >> $GITHUB_OUTPUT
                  echo "record_actions=$RECORD_ACTIONS" >> $GITHUB_OUTPUT

            - name: Run tests
              run: |
                  export PATH="$HOME/.local/share/dfx/bin:$PATH"
                  npm test
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}
              env:
                  AZLE_EXPERIMENTAL: ${{ inputs.run-experimental }}
                  AZLE_FUZZ: ${{ inputs.fuzz }}
                  AZLE_FUZZ_CALL_DELAY: ${{ inputs.call-delay }}
                  AZLE_FUZZ_TIME_LIMIT: ${{ inputs.time-limit }}
                  AZLE_RECORD_ACTIONS: ${{ steps.test-configuration.outputs.record_actions }}
                  AZLE_PROPTEST_NUM_RUNS: ${{ steps.test-configuration.outputs.runs }}
                  AZLE_PROPTEST_VERBOSE: true
                  AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE: ${{ steps.set-conditions.outputs.is_main_branch_push_from_feature_merge }}
                  AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE: ${{ steps.set-conditions.outputs.is_main_branch_push_from_release_merge }}
                  AZLE_IS_RELEASE_BRANCH_PR: ${{ steps.set-conditions.outputs.is_release_branch_pr }}
                  AZLE_IS_FEATURE_BRANCH_PR: ${{ steps.set-conditions.outputs.is_feature_branch_pr }}
                  AZLE_IS_FEATURE_BRANCH_DRAFT_PR: ${{ steps.set-conditions.outputs.is_feature_branch_draft_pr }}
