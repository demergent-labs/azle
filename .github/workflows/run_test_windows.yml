name: Run Test (Windows WSL)

on:
    workflow_call:
        inputs:
            directories:
                required: true
                type: string
            exclude-dirs:
                required: false
                type: string
                default: ''
            link-azle:
                required: true
                type: boolean
            run-experimental:
                required: false
                type: boolean
                default: false
            fuzz:
                required: false
                type: boolean
                default: false
            call-delay:
                required: false
                type: string
                default: '.1'
            time-limit:
                required: false
                type: string
                default: '300'

jobs:
    get-test-infos:
        name: Get test infos
        runs-on: ubuntu-latest
        outputs:
            test-infos: ${{ steps.get-test-infos.outputs.test-infos }}
        steps:
            - uses: actions/checkout@v4

            - id: get-test-infos
              uses: ./.github/actions/get_test_infos
              with:
                  directories: ${{ inputs.directories }}
                  exclude-dirs: ${{ inputs.exclude-dirs }}

    run-test:
        name: '${{matrix.test.name}} | ${{matrix.test.displayPath}} | ${{matrix.azle_source}} | WSL'
        needs: get-test-infos
        runs-on: windows-latest
        env:
            ETHEREUM_URL: ${{ secrets.ETHEREUM_URL }}
            AZLE_IDENTITY_STORAGE_MODE: 'plaintext'
            AZLE_END_TO_END_TEST_LINK_AZLE: ${{ matrix.azle_source == 'repo' }}

        strategy:
            fail-fast: false # We want to see which example tests succeed and which ones fail, we don't want one example test to cancel the rest
            matrix: # spins up one job per combination of test and code source (repo or npm).
                azle_source:
                    - ${{ inputs.link-azle == true && 'repo' || 'npm' }}
                test: ${{ fromJSON(needs.get-test-infos.outputs.test-infos) }}
        steps:
            - name: Setup WSL
              uses: Vampire/setup-wsl@v3
              with:
                  distribution: Ubuntu-22.04
                  update: 'true'
                  additional-packages: curl build-essential git jq
                  wsl-conf: |
                      [boot]
                      systemd=true
                  set-as-default: 'true'
                  wsl-shell-user: 'root'

            - name: Log Windows WSL Information
              run: |
                  echo "=== Windows WSL Information ==="
                  echo "WSL Version:"
                  wsl --version
                  echo "WSL Status:"
                  wsl --status
                  echo "WSL List:"
                  wsl --list --verbose
                  echo "=================================="
              shell: powershell

            - name: Upgrade to WSL 2
              run: |
                  echo "=== Upgrading to WSL 2 ==="
                  echo "Current WSL status before upgrade:"
                  wsl --status

                  echo "Updating WSL kernel..."
                  wsl --update --web-download

                  echo "Setting default version to WSL 2..."
                  wsl --set-default-version 2

                  echo "Converting Ubuntu to WSL 2..."
                  wsl --set-version Ubuntu 2

                  echo "WSL status after upgrade:"
                  wsl --status
                  wsl --list --verbose
                  echo "=================================="
              shell: powershell

            - name: Verify WSL 2 Upgrade
              run: |
                  echo "=== Verifying WSL 2 Upgrade ==="
                  echo "Final WSL Version:"
                  wsl --version
                  echo "Final WSL Status:"
                  wsl --status
                  echo "Final WSL List:"
                  wsl --list --verbose
                  echo "=================================="
              shell: powershell

            - name: Log WSL Environment Information
              run: |
                  echo "=== WSL Environment Diagnostics ==="
                  echo "Kernel Version:"
                  uname -a
                  echo "Ubuntu Version:"
                  cat /etc/os-release
                  echo "Available Disk Space:"
                  df -h
                  echo "Memory Information:"
                  free -h
                  echo "CPU Information:"
                  lscpu | head -20
                  echo "Environment Variables:"
                  env | sort
                  echo "Current User and Groups:"
                  id
                  echo "=================================="
              shell: wsl-bash {0}

            - name: Analyze PATH and Potential Conflicts
              run: |
                  echo "=== PATH Analysis ==="
                  echo "Full PATH:"
                  echo "$PATH"
                  echo ""
                  echo "PATH entries (one per line):"
                  echo "$PATH" | tr ':' '\n' | nl
                  echo ""
                  echo "Windows paths in PATH:"
                  echo "$PATH" | tr ':' '\n' | grep '/mnt/c' || echo "No Windows paths found"
                  echo ""
                  echo "Checking for command conflicts:"
                  echo "node locations:"
                  which -a node 2>/dev/null || echo "node not found"
                  echo "npm locations:"
                  which -a npm 2>/dev/null || echo "npm not found"
                  echo "git locations:"
                  which -a git 2>/dev/null || echo "git not found"
                  echo "python locations:"
                  which -a python 2>/dev/null || echo "python not found"
                  which -a python3 2>/dev/null || echo "python3 not found"
                  echo ""
                  echo "Testing clean PATH:"
                  export CLEAN_PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                  echo "Clean PATH: $CLEAN_PATH"
                  PATH="$CLEAN_PATH" which node 2>/dev/null || echo "node not found with clean PATH"
                  PATH="$CLEAN_PATH" which npm 2>/dev/null || echo "npm not found with clean PATH"
                  echo "=================================="
              shell: wsl-bash {0}

            - uses: actions/checkout@v4
              with:
                  # Configure checkout to use LF line endings
                  fetch-depth: 0

            - name: Configure git for Unix line endings
              run: |
                  # Configure git to use LF line endings and fix any existing files
                  git config core.autocrlf false
                  git config core.eol lf
                  # Reset and checkout to fix line endings
                  git rm --cached -r .
                  git reset --hard
              shell: wsl-bash {0}

            - uses: ./.github/actions/determine_workflow_context
              id: set-conditions

            - name: Print environment variables
              run: |
                  # Set workflow context variables inline
                  AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE="${{ steps.set-conditions.outputs.is_main_branch_push_from_feature_merge || 'false' }}"
                  AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE="${{ steps.set-conditions.outputs.is_main_branch_push_from_release_merge || 'false' }}"
                  AZLE_IS_RELEASE_BRANCH_PR="${{ steps.set-conditions.outputs.is_release_branch_pr || 'false' }}"
                  AZLE_IS_FEATURE_BRANCH_PR="${{ steps.set-conditions.outputs.is_feature_branch_pr || 'false' }}"
                  AZLE_IS_FEATURE_BRANCH_DRAFT_PR="${{ steps.set-conditions.outputs.is_feature_branch_draft_pr || 'false' }}"

                  echo "AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE: $AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE"
                  echo "AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE: $AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE"
                  echo "AZLE_IS_RELEASE_BRANCH_PR: $AZLE_IS_RELEASE_BRANCH_PR"
                  echo "AZLE_IS_FEATURE_BRANCH_PR: $AZLE_IS_FEATURE_BRANCH_PR"
                  echo "AZLE_IS_FEATURE_BRANCH_DRAFT_PR: $AZLE_IS_FEATURE_BRANCH_DRAFT_PR"
              shell: wsl-bash {0}

            - name: Report full path of test
              # Just in case the path isn't obvious from the name, this will remove ambiguity
              run: echo ${{matrix.test.path}}
              shell: wsl-bash {0}

            - name: Setup Node.js in WSL
              run: |
                  # Use clean PATH to avoid Windows conflicts
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

                  # Get Node version from package.json
                  NODE_VERSION=$(jq -r '.azle.globalDependencies.node // error("node version not found")' "package.json")
                  # Extract major version number (e.g., "22.14.0" -> "22")
                  MAJOR_VERSION=$(echo $NODE_VERSION | cut -d. -f1)
                  echo "Installing Node.js version $NODE_VERSION (major version $MAJOR_VERSION) in WSL..."

                  # Install Node.js using NodeSource repository
                  curl -fsSL https://deb.nodesource.com/setup_${MAJOR_VERSION}.x | sudo -E bash -
                  sudo apt-get install -y nodejs

                  # Verify installation with clean PATH
                  echo "Installed Node version:"
                  PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" node --version
                  echo "Installed npm version:"
                  PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" npm --version
                  echo "Node installation path:"
                  PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" which node
                  echo "npm installation path:"
                  PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" which npm
              shell: wsl-bash {0}

            - name: Install dfx
              run: |
                  # Use clean PATH to avoid Windows conflicts
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

                  DFX_VERSION=$(jq -r '.azle.globalDependencies.dfx // error("dfx version not found")' "package.json")
                  echo "Installing dfx version $DFX_VERSION..."
                  DFXVM_INIT_YES=true DFX_VERSION=$DFX_VERSION sh -ci "$(curl --retry 3 -fsSL https://sdk.dfinity.org/install.sh)"
                  export PATH="$HOME/.local/share/dfx/bin:$PATH"
                  if ! command -v dfx &> /dev/null; then
                      echo "dfx installation verification failed" >&2
                      exit 1
                  fi
                  echo "dfx installation completed."
                  echo "Installed dfx version:"
                  dfx --version
                  echo "dfx installation path:"
                  which dfx
              shell: wsl-bash {0}

            - name: Install npm dependencies
              run: |
                  # Use clean PATH with dfx
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"
                  # Run npm install
                  npm install
              shell: wsl-bash {0}

            - name: Test with Clean Environment
              run: |
                  echo "=== Testing with Clean Environment ==="
                  # Create a clean PATH without Windows directories
                  export CLEAN_PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"
                  export PATH="$CLEAN_PATH"

                  echo "Testing with clean PATH: $PATH"
                  echo "Node version with clean PATH:"
                  node --version || echo "Node failed with clean PATH"
                  echo "npm version with clean PATH:"
                  npm --version || echo "npm failed with clean PATH"
                  echo "dfx version with clean PATH:"
                  dfx --version || echo "dfx failed with clean PATH"

                  # Test basic npm operations
                  echo "Testing npm list:"
                  npm list --depth=0 || echo "npm list failed"

                  echo "=================================="
              shell: wsl-bash {0}

            - name: npm link
              if: matrix.azle_source == 'repo'
              shell: wsl-bash {0}
              run: |
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"
                  npm link

            - name: npm run lint
              shell: wsl-bash {0}
              run: |
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"
                  npm run lint

            - name: npm install in test directory
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}
              run: |
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"
                  npm install

            - name: Install experimental dependencies for stable api tests if running in experimental mode
              if: ${{ inputs.run-experimental }}
              run: |
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"
                  npm install https://github.com/demergent-labs/azle-experimental-deps#882dcaa3aa0ccb66d81ee923c8279369a8424bfa
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}

            - name: npm link azle
              if: matrix.azle_source == 'repo'
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}
              run: |
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"
                  npm link azle

            - name: Test configuration
              id: test-configuration
              shell: wsl-bash {0}
              run: |
                  # Set workflow context variables inline
                  AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE="${{ steps.set-conditions.outputs.is_main_branch_push_from_feature_merge || 'false' }}"
                  AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE="${{ steps.set-conditions.outputs.is_main_branch_push_from_release_merge || 'false' }}"
                  AZLE_IS_RELEASE_BRANCH_PR="${{ steps.set-conditions.outputs.is_release_branch_pr || 'false' }}"
                  AZLE_IS_FEATURE_BRANCH_PR="${{ steps.set-conditions.outputs.is_feature_branch_pr || 'false' }}"
                  AZLE_IS_FEATURE_BRANCH_DRAFT_PR="${{ steps.set-conditions.outputs.is_feature_branch_draft_pr || 'false' }}"

                  RECORD_ACTIONS='true'
                  RUNS=1

                  if [[ "$AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE" == "true" ]]; then
                      RUNS=5
                  fi

                  if [[ "$AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE" == "true" ]]; then
                      RUNS=100
                  fi

                  if [[ "$AZLE_IS_RELEASE_BRANCH_PR" == "true" ]]; then
                      RECORD_ACTIONS='false'
                      RUNS=10
                  fi

                  if [[ "$AZLE_IS_FEATURE_BRANCH_PR" == "true" ]]; then
                      RUNS=5
                  fi

                  if [[ "$AZLE_IS_FEATURE_BRANCH_DRAFT_PR" == "true" ]]; then
                      RUNS=1
                  fi

                  echo "Running tests $RUNS times"

                  echo "runs=$RUNS" >> $GITHUB_OUTPUT
                  echo "record_actions=$RECORD_ACTIONS" >> $GITHUB_OUTPUT

            - name: Run tests
              run: |
                  # Set clean PATH
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"

                  # Set workflow context variables inline
                  export AZLE_IS_MAIN_BRANCH_PUSH_FROM_FEATURE_MERGE="${{ steps.set-conditions.outputs.is_main_branch_push_from_feature_merge || 'false' }}"
                  export AZLE_IS_MAIN_BRANCH_PUSH_FROM_RELEASE_MERGE="${{ steps.set-conditions.outputs.is_main_branch_push_from_release_merge || 'false' }}"
                  export AZLE_IS_RELEASE_BRANCH_PR="${{ steps.set-conditions.outputs.is_release_branch_pr || 'false' }}"
                  export AZLE_IS_FEATURE_BRANCH_PR="${{ steps.set-conditions.outputs.is_feature_branch_pr || 'false' }}"
                  export AZLE_IS_FEATURE_BRANCH_DRAFT_PR="${{ steps.set-conditions.outputs.is_feature_branch_draft_pr || 'false' }}"

                  # Set test configuration variables
                  export AZLE_EXPERIMENTAL="${{ inputs.run-experimental }}"
                  export AZLE_FUZZ="${{ inputs.fuzz }}"
                  export AZLE_FUZZ_CALL_DELAY="${{ inputs.call-delay }}"
                  export AZLE_FUZZ_TIME_LIMIT="${{ inputs.time-limit }}"
                  export AZLE_RECORD_ACTIONS="${{ steps.test-configuration.outputs.record_actions }}"
                  export AZLE_PROPTEST_NUM_RUNS="${{ steps.test-configuration.outputs.runs }}"
                  export AZLE_PROPTEST_VERBOSE=true
                  export AZLE_VERBOSE=true

                  dfx start --clean --background --artificial-delay 0
                  npm test
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}

            - name: Log Azle Artifacts and Build Information
              if: always()
              run: |
                  export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$HOME/.local/share/dfx/bin"

                  echo "=== Azle Artifacts Diagnostics ==="
                  echo "Current working directory:"
                  pwd
                  echo "Directory contents:"
                  ls -la

                  echo "Checking for .azle directory:"
                  if [ -d ".azle" ]; then
                      echo ".azle directory exists"
                      echo ".azle directory contents:"
                      ls -la .azle/

                      echo "Checking for main.js:"
                      if [ -f ".azle/main.js" ]; then
                          echo "main.js exists, size:"
                          ls -lh .azle/main.js
                          echo "main.js first 20 lines:"
                          head -20 .azle/main.js
                      else
                          echo "main.js does NOT exist"
                      fi

                      echo "Checking for WASM binary:"
                      find .azle -name "*.wasm" -exec ls -lh {} \;

                      echo "Checking for Candid file:"
                      find .azle -name "*.did" -exec ls -lh {} \; -exec head -10 {} \;

                  else
                      echo ".azle directory does NOT exist"
                  fi

                  echo "Checking for dfx.json:"
                  if [ -f "dfx.json" ]; then
                      echo "dfx.json exists:"
                      cat dfx.json
                  else
                      echo "dfx.json does NOT exist"
                  fi

                  echo "Checking for node_modules:"
                  if [ -d "node_modules" ]; then
                      echo "node_modules exists"
                      echo "azle in node_modules:"
                      ls -la node_modules/ | grep azle || echo "azle not found in node_modules"
                  else
                      echo "node_modules does NOT exist"
                  fi

                  echo "dfx info:"
                  dfx info || echo "dfx info failed"

                  echo "=================================="
              working-directory: ${{ matrix.test.path }}
              shell: wsl-bash {0}

            - name: Upload Azle Artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: azle-artifacts-${{ matrix.test.name }}-${{ matrix.azle_source }}-${{ github.run_id }}
                  path: |
                      ${{ matrix.test.path }}/.azle/
                      ${{ matrix.test.path }}/dfx.json
                      ${{ matrix.test.path }}/package.json
                      ${{ matrix.test.path }}/node_modules/azle/package.json
                  if-no-files-found: warn

            - name: Upload Test Logs
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-logs-${{ matrix.test.name }}-${{ matrix.azle_source }}-${{ github.run_id }}
                  path: |
                      ${{ matrix.test.path }}/.dfx/
                      ${{ matrix.test.path }}/test-results/
                  if-no-files-found: warn
